<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>棰滆壊娣峰悎鍣?/title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px;min-height:100vh}
.container{max-width:650px;margin:0 auto}
h1{text-align:center;color:#333;margin-bottom:24px;font-size:22px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:24px;margin-bottom:16px}
label{display:block;font-weight:600;margin-bottom:6px;color:#555;font-size:14px}
input[type="color"]{width:60px;height:40px;border:1px solid #ddd;border-radius:4px;cursor:pointer;padding:2px}
input[type="range"]{width:200px;vertical-align:middle}
.btn{background:#007bff;color:#fff;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-size:14px;margin-top:8px}
.btn:hover{background:#0056b3}
.btn-green{background:#28a745}
.btn-green:hover{background:#218838}
.color-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px;background:#f9f9f9;border-radius:6px}
.color-row label{margin:0;white-space:nowrap}
.color-row .hex-input{padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px;width:100px;font-family:monospace}
.blend-preview{width:100%;height:80px;border-radius:8px;margin:16px 0;border:1px solid #e0e0e0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;cursor:pointer;transition:background .2s}
.steps{display:flex;gap:2px;margin:12px 0;border-radius:6px;overflow:hidden}
.step{flex:1;height:50px;cursor:pointer;position:relative}
.step:hover::after{content:attr(data-hex);position:absolute;bottom:2px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font-size:10px;padding:2px 4px;border-radius:2px;white-space:nowrap}
.result-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.result-item{background:#f5f5f5;padding:10px;border-radius:4px;font-size:13px}
.result-item .label{color:#888;font-size:11px}
.result-item .value{font-family:monospace;font-size:14px;margin-top:4px;cursor:pointer}
.result-item .value:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="container">
<h1>棰滆壊娣峰悎鍣?/h1>
<div class="card">
<div class="color-row">
<label>棰滆壊 A锛?/label>
<input type="color" id="colorA" value="#ff5733">
<input type="text" class="hex-input" id="hexA" value="#ff5733">
</div>
<div class="color-row">
<label>棰滆壊 B锛?/label>
<input type="color" id="colorB" value="#33a8ff">
<input type="text" class="hex-input" id="hexB" value="#33a8ff">
</div>
<div style="margin-bottom:12px">
<label>娣峰悎姣斾緥</label>
<div style="display:flex;align-items:center;gap:8px;margin-top:6px">
<span id="ratioText">50%</span>
<input type="range" id="ratio" min="0" max="100" value="50">
</div>
</div>
<div>
<label>涓棿鑹叉暟閲?/label>
<div style="display:flex;align-items:center;gap:8px;margin-top:6px">
<input type="number" id="steps" value="5" min="2" max="20" style="width:60px;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px">
<button class="btn" onclick="blend()">娣峰悎棰滆壊</button>
</div>
</div>
</div>
<div class="card">
<div class="blend-preview" id="blendPreview" onclick="copyColor()">鐐瑰嚮澶嶅埗棰滆壊鍊?/div>
<div class="steps" id="stepsDiv"></div>
<div class="result-info" id="resultInfo"></div>
<div style="margin-top:12px">
<button class="btn btn-green" onclick="copyColor()">澶嶅埗娣峰悎鑹?/button>
<button class="btn" onclick="copyGradient()">澶嶅埗CSS娓愬彉</button>
</div>
</div>
</div>
<script>
document.getElementById('colorA').addEventListener('input',e=>{document.getElementById('hexA').value=e.target.value;blend()});
document.getElementById('colorB').addEventListener('input',e=>{document.getElementById('hexB').value=e.target.value;blend()});
document.getElementById('hexA').addEventListener('change',e=>{const v=e.target.value;if(/^#[0-9a-f]{6}$/i.test(v)){document.getElementById('colorA').value=v;blend()}});
document.getElementById('hexB').addEventListener('change',e=>{const v=e.target.value;if(/^#[0-9a-f]{6}$/i.test(v)){document.getElementById('colorB').value=v;blend()}});
document.getElementById('ratio').addEventListener('input',e=>{document.getElementById('ratioText').textContent=e.target.value+'%';blend()});
function hexToRgb(hex){
hex=hex.replace('#','');
return{r:parseInt(hex.substr(0,2),16),g:parseInt(hex.substr(2,2),16),b:parseInt(hex.substr(4,2),16)};
}
function rgbToHex(r,g,b){return '#'+[r,g,b].map(x=>Math.round(x).toString(16).padStart(2,'0')).join('')}
function rgbToHsl(r,g,b){
r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b),l=(max+min)/2;
let h,s;if(max===min){h=s=0}else{const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);
switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}}
return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}
let currentBlend='#997f99';
function blend(){
const a=hexToRgb(document.getElementById('colorA').value);
const b=hexToRgb(document.getElementById('colorB').value);
const ratio=parseInt(document.getElementById('ratio').value)/100;
const stepsCount=parseInt(document.getElementById('steps').value)||5;
const mr=Math.round(a.r*(1-ratio)+b.r*ratio);
const mg=Math.round(a.g*(1-ratio)+b.g*ratio);
const mb=Math.round(a.b*(1-ratio)+b.b*ratio);
currentBlend=rgbToHex(mr,mg,mb);
const hsl=rgbToHsl(mr,mg,mb);
document.getElementById('blendPreview').style.background=currentBlend;
document.getElementById('blendPreview').textContent=currentBlend.toUpperCase();
document.getElementById('blendPreview').style.color=hsl.l>55?'#333':'#fff';
document.getElementById('resultInfo').innerHTML=`
<div class="result-item"><div class="label">HEX</div><div class="value" onclick="navigator.clipboard.writeText('${currentBlend}')">${currentBlend.toUpperCase()}</div></div>
<div class="result-item"><div class="label">RGB</div><div class="value" onclick="navigator.clipboard.writeText('rgb(${mr},${mg},${mb})')">rgb(${mr}, ${mg}, ${mb})</div></div>
<div class="result-item"><div class="label">HSL</div><div class="value" onclick="navigator.clipboard.writeText('hsl(${hsl.h},${hsl.s}%,${hsl.l}%)')">hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)</div></div>
`;
const stepsDiv=document.getElementById('stepsDiv');
stepsDiv.innerHTML='';
for(let i=0;i<stepsCount;i++){
const t=i/(stepsCount-1);
const sr=Math.round(a.r*(1-t)+b.r*t);
const sg=Math.round(a.g*(1-t)+b.g*t);
const sb=Math.round(a.b*(1-t)+b.b*t);
const shex=rgbToHex(sr,sg,sb);
const step=document.createElement('div');
step.className='step';
step.style.background=shex;
step.setAttribute('data-hex',shex.toUpperCase());
step.onclick=()=>{navigator.clipboard.writeText(shex.toUpperCase())};
stepsDiv.appendChild(step);
}
}
function copyColor(){navigator.clipboard.writeText(currentBlend.toUpperCase());alert('宸插鍒? '+currentBlend.toUpperCase())}
function copyGradient(){
const a=document.getElementById('colorA').value;
const b=document.getElementById('colorB').value;
navigator.clipboard.writeText(`background: linear-gradient(to right, ${a}, ${b});`);
alert('宸插鍒禖SS娓愬彉!');
}
blend();
</script>
</body>
</html>
