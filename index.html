<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜色混合器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; color: #333; }
        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 24px; margin-bottom: 16px; }
        .color-inputs { display: flex; gap: 24px; margin-bottom: 16px; }
        .color-group { flex: 1; }
        .color-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .color-picker { display: flex; gap: 8px; align-items: center; }
        input[type="color"] { width: 60px; height: 40px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; }
        input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: monospace; }
        .color-preview { height: 80px; border-radius: 8px; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,0.5); transition: background 0.3s; }
        .slider-group { margin-bottom: 16px; }
        .slider-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .slider-row { display: flex; align-items: center; gap: 12px; }
        input[type="range"] { flex: 1; }
        .slider-value { width: 50px; text-align: center; font-family: monospace; }
        .blend-preview { display: flex; gap: 8px; margin-top: 16px; }
        .blend-step { flex: 1; height: 60px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .btn { padding: 8px 20px; border-radius: 4px; cursor: pointer; border: none; font-size: 14px; margin-right: 8px; }
        .btn-blue { background: #007bff; color: #fff; }
        .btn-green { background: #28a745; color: #fff; }
        .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-top: 16px; }
        .result-item { background: #f5f5f5; padding: 16px; border-radius: 8px; text-align: center; }
        .result-value { font-size: 1.2rem; font-weight: 600; color: #007bff; }
        .result-label { font-size: 12px; color: #666; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>颜色混合器</h1>
        <div class="card">
            <div class="color-inputs">
                <div class="color-group">
                    <label>颜色 1</label>
                    <div class="color-picker">
                        <input type="color" id="color1" value="#ff0000" onchange="updateBlends()">
                        <input type="text" id="hex1" value="#ff0000" onchange="updateFromHex(1)">
                    </div>
                </div>
                <div class="color-group">
                    <label>颜色 2</label>
                    <div class="color-picker">
                        <input type="color" id="color2" value="#0000ff" onchange="updateBlends()">
                        <input type="text" id="hex2" value="#0000ff" onchange="updateFromHex(2)">
                    </div>
                </div>
            </div>
            <div class="slider-group">
                <label>混合比例: <span id="ratioDisplay">50%</span></label>
                <div class="slider-row">
                    <span>颜色1</span>
                    <input type="range" id="ratio" min="0" max="100" value="50" oninput="updateRatio()">
                    <span>颜色2</span>
                    <span class="slider-value" id="ratioValue">50%</span>
                </div>
            </div>
            <button class="btn btn-blue" onclick="blendColors()">计算混合</button>
        </div>
        <div class="card">
            <label>混合预览</label>
            <div class="blend-preview" id="blendPreview"></div>
            <div class="color-preview" id="mainPreview">#800080</div>
        </div>
        <div class="card">
            <label>混合结果</label>
            <div class="result-grid" id="results"></div>
        </div>
    </div>
    <script>
        let ratio = 50;
        
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }
        
        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(x => {
                const hex = Math.round(Math.max(0, Math.min(255, x))).toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('').toUpperCase();
        }
        
        function updateFromHex(num) {
            const hex = document.getElementById('hex' + num).value;
            if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
                document.getElementById('color' + num).value = hex;
                updateBlends();
            }
        }
        
        function updateRatio() {
            ratio = parseInt(document.getElementById('ratio').value);
            document.getElementById('ratioDisplay').textContent = ratio + '%';
            document.getElementById('ratioValue').textContent = ratio + '%';
            blendColors();
        }
        
        function blendColors() {
            const c1 = hexToRgb(document.getElementById('hex1').value);
            const c2 = hexToRgb(document.getElementById('hex2').value);
            
            if (!c1 || !c2) return;
            
            // Calculate blended color
            const t = ratio / 100;
            const blended = {
                r: c1.r * (1 - t) + c2.r * t,
                g: c1.g * (1 - t) + c2.g * t,
                b: c1.b * (1 - t) + c2.b * t
            };
            
            const blendedHex = rgbToHex(blended.r, blended.g, blended.b);
            
            // Update preview
            document.getElementById('mainPreview').style.backgroundColor = blendedHex;
            document.getElementById('mainPreview').textContent = blendedHex;
            
            // Update blend steps
            updateBlends();
            
            // Update results
            const hsl = rgbToHsl(blended.r, blended.g, blended.b);
            document.getElementById('results').innerHTML = `
                <div class="result-item"><div class="result-value">${blendedHex}</div><div class="result-label">HEX</div></div>
                <div class="result-item"><div class="result-value">rgb(${Math.round(blended.r)}, ${Math.round(blended.g)}, ${Math.round(blended.b)})</div><div class="result-label">RGB</div></div>
                <div class="result-item"><div class="result-value">hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)</div><div class="result-label">HSL</div></div>
            `;
        }
        
        function updateBlends() {
            const c1 = hexToRgb(document.getElementById('hex1').value);
            const c2 = hexToRgb(document.getElementById('hex2').value);
            if (!c1 || !c2) return;
            
            const steps = [0, 25, 50, 75, 100];
            const preview = document.getElementById('blendPreview');
            preview.innerHTML = '';
            
            steps.forEach(step => {
                const t = step / 100;
                const color = {
                    r: Math.round(c1.r * (1 - t) + c2.r * t),
                    g: Math.round(c1.g * (1 - t) + c2.g * t),
                    b: Math.round(c1.b * (1 - t) + c2.b * t)
                };
                const hex = rgbToHex(color.r, color.g, color.b);
                const div = document.createElement('div');
                div.className = 'blend-step';
                div.style.backgroundColor = hex;
                div.textContent = step + '%';
                preview.appendChild(div);
            });
        }
        
        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            
            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }
        
        blendColors();
    </script>
</body>
</html>
